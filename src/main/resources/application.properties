spring.application.name=myweb
server.port=${PORT:8080}
app.admin-password=${ADMIN_PASSWORD}
app.upload-dir=${UPLOAD_DIR:uploads}
# S3 호환 스토리지(Cloudflare R2 등). S3_BUCKET 비우면 로컬 uploads/ 사용.
app.s3.endpoint=${S3_ENDPOINT:}
app.s3.region=${S3_REGION:auto}
app.s3.bucket=${S3_BUCKET:}
app.s3.access-key=${S3_ACCESS_KEY:}
app.s3.secret-key=${S3_SECRET_KEY:}
app.s3.public-base-url=${S3_PUBLIC_BASE_URL:}
app.cors-allowed-origins=${CORS_ALLOWED_ORIGINS}


spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ===== MAIL SETTINGS =====

resend.api-key=${RESEND_API_KEY}
app.contact.to=${CONTACT_TO_EMAIL}
app.contact.from=${CONTACT_FROM_EMAIL}